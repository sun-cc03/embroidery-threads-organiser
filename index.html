<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embroidery Organiser</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eceae4;
  --text: #1a1a18; --text2: #6b6a64; --text3: #9c9a92;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --success-bg: #eaf3de; --success-fg: #3B6D11;
  --danger-bg: #fcebeb; --danger-fg: #A32D2D;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1c; --bg2: #272724; --bg3: #2f2f2c;
    --text: #e8e6de; --text2: #9c9a92; --text3: #6b6a64;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --success-bg: #173404; --success-fg: #97C459;
    --danger-bg: #501313; --danger-fg: #F09595;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); min-height: 100vh; padding: 1.5rem 1rem; }
.app { max-width: 900px; margin: 0 auto; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
.lock-screen { position: fixed; inset: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
.lock-box { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2rem 1.5rem; width: 100%; max-width: 300px; text-align: center; }
.lock-box h2 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.lock-box p { font-size: 12px; color: var(--text2); margin-bottom: 1.25rem; }
.lock-box input { width: 100%; padding: 9px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); text-align: center; letter-spacing: 2px; margin-bottom: 10px; font-family: inherit; }
.lock-box input.error { border-color: #A32D2D; }
.lock-btn { width: 100%; padding: 9px; font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius); background: var(--text); color: var(--bg); cursor: pointer; }
.lock-btn:hover { opacity: 0.85; }
.lock-error { font-size: 11px; color: #A32D2D; margin-top: 8px; min-height: 16px; }
.app-tabs { display: flex; border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; background: var(--bg); }
.app-tab { padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: all 0.12s; }
.app-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.page { display: none; }
.page.active { display: block; }
.hdr { padding: 1.1rem 1.25rem 0.6rem; border-bottom: 0.5px solid var(--border); }
.hdr h2 { font-size: 17px; font-weight: 500; color: var(--text); }
.hdr p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.toolbar { display: flex; gap: 8px; padding: 0.6rem 1.25rem; flex-wrap: wrap; align-items: center; border-bottom: 0.5px solid var(--border); }
.sw { position: relative; flex: 1; min-width: 120px; }
.sw input { width: 100%; padding: 6px 9px 6px 28px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); }
.sw svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; color: var(--text); }
.add-btn { padding: 6px 13px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text); font-weight: 500; white-space: nowrap; }
.add-btn:hover { background: var(--bg2); }
.filter-row { display: flex; gap: 4px; flex-wrap: wrap; padding: 0.45rem 1.25rem; border-bottom: 0.5px solid var(--border); align-items: center; }
.filter-lbl { font-size: 11px; color: var(--text3); margin-right: 2px; white-space: nowrap; }
.tab { padding: 3px 9px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.12s; white-space: nowrap; }
.tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.colour-filters { display: flex; gap: 5px; flex-wrap: wrap; padding: 0.45rem 1.25rem; border-bottom: 0.5px solid var(--border); align-items: center; }
.cdot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s; position: relative; flex-shrink: 0; }
.cdot:hover { transform: scale(1.15); }
.cdot.active { border-color: var(--text); transform: scale(1.15); }
.cdot.active::after { content:''; position:absolute; inset:3px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.65); }
.brand-tabs { display: flex; gap: 4px; padding: 0.45rem 1.25rem; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; align-items: center; }
.brand-tab { padding: 3px 10px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.12s; }
.brand-tab.active { border-color: transparent; color: #fff; }
.brand-tab[data-b="All"].active    { background: var(--text); color: var(--bg); }
.brand-tab[data-b="DMC"].active    { background: #C0392B; }
.brand-tab[data-b="Cosmo"].active  { background: #2980B9; }
.brand-tab[data-b="Olympus"].active{ background: #27AE60; }
.brand-tab[data-b="Anchor"].active { background: #8E44AD; }
.brand-tab[data-b="Other"].active  { background: #888780; }
.stats-bar { display: flex; gap: 8px; padding: 0.6rem 1.25rem; border-bottom: 0.5px solid var(--border); }
.stat { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 7px 10px; }
.stat-val { font-size: 19px; font-weight: 500; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--text2); }
.thread-grid { padding: 1rem 1.25rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(138px,1fr)); gap: 10px; }
.card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.12s; position: relative; background: var(--bg); }
.card:hover { border-color: var(--border2); }
.card.buy { border-color: #D4520A; }
.brand-stripe { height: 4px; width: 100%; }
.swatch { width: 100%; height: 50px; border-bottom: 0.5px solid var(--border); }
.card-body { padding: 8px 10px 5px; }
.thread-no { font-size: 13px; font-weight: 500; color: var(--text); }
.thread-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.pill { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 10px; font-weight: 500; white-space: nowrap; line-height: 1.4; }
.pill.DMC     { background: #FADBD8; color: #922B21; }
.pill.Cosmo   { background: #D6EAF8; color: #1A5276; }
.pill.Olympus { background: #D5F5E3; color: #1E8449; }
.pill.Anchor  { background: #E8DAEF; color: #6C3483; }
.pill.Other   { background: #ECEAE4; color: #444441; }
.pill.buy-pill { background: transparent; color: #D4520A; border: 1px solid #D4520A; cursor: pointer; }
.pill.buy-pill:hover, .pill.buy-pill.marked { background: #D4520A; color: #fff; }
.thread-name { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-top: 2px; }
.card-foot { display: flex; align-items: center; justify-content: flex-end; padding: 3px 10px 8px; }
.qty-controls { display: flex; align-items: center; gap: 4px; }
.qb { width: 20px; height: 20px; border: 0.5px solid var(--border2); border-radius: 5px; background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qb:hover { background: var(--bg2); }
.qv { font-size: 12px; font-weight: 500; min-width: 14px; text-align: center; color: var(--text); }
.del-x { position: absolute; top: 7px; right: 5px; width: 15px; height: 15px; border-radius: 50%; background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 11px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.12s; z-index: 2; }
.card:hover .del-x { opacity: 1; }
.del-x:hover { color: #A32D2D; }
.empty { text-align: center; padding: 3rem 1.25rem; color: var(--text2); font-size: 13px; }
.hidden { display: none; }
.proj-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.65rem 1.25rem; border-bottom: 0.5px solid var(--border); }
.proj-toolbar span { font-size: 13px; color: var(--text2); }
.proj-list { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 12px; }
.proj-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
.proj-top { display: flex; flex-direction: column; }
.proj-photos { display: flex; flex-direction: row; width: 100%; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
.proj-photo-slot { flex: 1; height: 110px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; border-right: 0.5px solid var(--border); }
.proj-photo-slot:last-child { border-right: none; }
.proj-photo-slot img { width: 100%; height: 110px; object-fit: cover; display: block; }
.slot-placeholder { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.slot-placeholder svg { opacity: 0.2; color: var(--text); }
.slot-lbl { font-size: 9px; color: var(--text3); }
.rm-photo { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 9px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1; }
.proj-photo-slot:hover .rm-photo { display: flex; }
.tswatch-inline { width: 12px; height: 12px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.1); flex-shrink: 0; display: inline-block; vertical-align: middle; margin-right: 3px; }
.ac-wrap { position: relative; flex: 1.4; }
.ac-wrap input { width: 100%; font-size: 12px; padding: 5px 7px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); z-index: 200; max-height: 160px; overflow-y: auto; margin-top: 2px; }
.ac-item { display: flex; align-items: center; gap: 7px; padding: 6px 9px; cursor: pointer; font-size: 12px; color: var(--text); }
.ac-item:hover { background: var(--bg2); }
.ac-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.1); }
.ac-label { flex: 1; }
.ac-name { font-size: 10px; color: var(--text3); margin-left: 2px; }
.proj-info { flex: 1; padding: 10px 13px; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.proj-name { font-size: 14px; font-weight: 500; color: var(--text); }
.proj-desc { font-size: 11px; color: var(--text2); line-height: 1.5; border-left: 2px solid var(--border2); padding-left: 7px; }
.proj-stats { display: flex; gap: 5px; flex-wrap: wrap; }
.pstat { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
.pstat.ok   { background: #EAF3DE; color: #3B6D11; }
.pstat.miss { background: #FFF0E8; color: #C04A10; }
.pstat.unk  { background: var(--bg2); color: var(--text3); }
.proj-actions { display: flex; gap: 6px; padding: 0 13px 10px; justify-content: flex-end; }
.proj-btn { font-size: 11px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; }
.proj-btn:hover { background: var(--bg2); }
.proj-btn.danger { color: #A32D2D; }
.thread-list { border-top: 0.5px solid var(--border); padding: 8px 13px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px 10px; }
.trow { display: flex; align-items: center; gap: 5px; min-width: 0; }
.tswatch { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.1); }
.tno { font-size: 12px; font-weight: 500; color: var(--text); min-width: 76px; }
.tuse { font-size: 11px; color: var(--text2); flex: 1; font-style: italic; }
.tstatus { font-size: 10px; padding: 1px 5px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.tstatus.in  { background: #EAF3DE; color: #3B6D11; }
.tstatus.out { background: #FFF0E8; color: #C04A10; }
.tstatus.unknown { background: var(--bg2); color: var(--text3); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; z-index: 100; overflow-y: auto; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.25rem; width: 100%; max-width: 360px; margin: auto; }
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: var(--text); }
.field { margin-bottom: 10px; }
.field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
.field input, .field select, .field textarea { width: 100%; padding: 7px 9px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
.field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.crow { display: flex; gap: 8px; align-items: center; }
.crow input[type=text] { flex: 1; }
.cpick { width: 36px; height: 32px; border-radius: var(--radius); border: 0.5px solid var(--border2); cursor: pointer; padding: 2px; }
.mact { display: flex; gap: 8px; margin-top: 1rem; }
.mbtn { flex: 1; padding: 7px; font-size: 13px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--text); color: var(--bg); cursor: pointer; }
.mcanc { padding: 7px 14px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; }
.brand-row { display: flex; gap: 6px; }
.brand-row select, .brand-row input { flex: 1; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text2); margin: 10px 0 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.proj-thread-row { display: flex; gap: 5px; align-items: center; margin-bottom: 6px; }
.proj-thread-row input { font-size: 12px; padding: 5px 7px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
.proj-thread-row input:first-child { flex: 1.2; }
.proj-thread-row input:nth-child(2) { width: 72px; }
.proj-thread-row input:nth-child(3) { flex: 1.5; }
.rm-btn { width: 22px; height: 22px; border: none; background: transparent; color: var(--text3); font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
.rm-btn:hover { color: #A32D2D; background: var(--bg2); }
.add-trow { font-size: 12px; color: #2980B9; cursor: pointer; padding: 2px 0; display: inline-block; }
.add-trow:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="lock-screen" class="lock-screen">
  <div class="lock-box">
    <h2>🧵 Sunday Needleworks</h2>
    <p>Enter password to continue</p>
    <input type="password" id="lock-input" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">Enter</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div class="app">
  <div class="app-tabs">
    <div class="app-tab active" onclick="showPage('threads')">🧵 Threads</div>
    <div class="app-tab" onclick="showPage('projects')">🪡 Projects</div>
  </div>

  <!-- THREADS PAGE -->
  <div class="page active" id="page-threads">
    <div class="hdr">
      <h2>Thread collection</h2>
      <p>DMC · Cosmo · Olympus · Anchor · Other</p>
    </div>
    <div class="toolbar">
      <div class="sw">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="search" placeholder="Search number or name…" oninput="render()">
      </div>
      <button class="add-btn" onclick="openThreadModal()">+ Add thread</button>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">Show:</span>
      <button class="tab active" onclick="setFilter('all',this)">All</button>
      <button class="tab" onclick="setFilter('in',this)">In stock</button>
      <button class="tab" onclick="setFilter('buy',this)">Need to buy</button>
    </div>
    <div class="colour-filters">
      <span class="filter-lbl">Colour:</span>
      <div class="cdot active" data-col="all" style="background:var(--bg2);border:1.5px solid var(--border2)" title="All" onclick="setColour('all',this)"></div>
      <div class="cdot" data-col="red"    style="background:#E24B4A" title="Red"    onclick="setColour('red',this)"></div>
      <div class="cdot" data-col="orange" style="background:#F07A20" title="Orange" onclick="setColour('orange',this)"></div>
      <div class="cdot" data-col="yellow" style="background:#F5C518" title="Yellow" onclick="setColour('yellow',this)"></div>
      <div class="cdot" data-col="green"  style="background:#3B9A3B" title="Green"  onclick="setColour('green',this)"></div>
      <div class="cdot" data-col="blue"   style="background:#2477C4" title="Blue"   onclick="setColour('blue',this)"></div>
      <div class="cdot" data-col="purple" style="background:#7F77DD" title="Purple" onclick="setColour('purple',this)"></div>
      <div class="cdot" data-col="pink"   style="background:#D4537E" title="Pink"   onclick="setColour('pink',this)"></div>
      <div class="cdot" data-col="white"  style="background:#f0ede6;border-color:var(--border2)" title="White/Cream" onclick="setColour('white',this)"></div>
      <div class="cdot" data-col="brown"  style="background:#8B5E3C" title="Brown"  onclick="setColour('brown',this)"></div>
      <div class="cdot" data-col="black"  style="background:#2a2a28" title="Black"  onclick="setColour('black',this)"></div>
      <div class="cdot" data-col="gray"   style="background:#888780" title="Gray"   onclick="setColour('gray',this)"></div>
    </div>
    <div class="brand-tabs">
      <span class="filter-lbl">Brand:</span>
      <button class="brand-tab active" data-b="All"     onclick="setBrand('All',this)">All</button>
      <button class="brand-tab" data-b="DMC"     onclick="setBrand('DMC',this)">DMC</button>
      <button class="brand-tab" data-b="Cosmo"   onclick="setBrand('Cosmo',this)">Cosmo</button>
      <button class="brand-tab" data-b="Olympus" onclick="setBrand('Olympus',this)">Olympus</button>
      <button class="brand-tab" data-b="Anchor"  onclick="setBrand('Anchor',this)">Anchor</button>
      <button class="brand-tab" data-b="Other"   onclick="setBrand('Other',this)">Other</button>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-val" id="s-in" style="color:var(--success-fg)">0</div><div class="stat-lbl">In stock</div></div>
      <div class="stat"><div class="stat-val" id="s-buy" style="color:#D4520A">0</div><div class="stat-lbl">Need to buy</div></div>
    </div>
    <div class="thread-grid" id="grid"></div>
    <div class="empty hidden" id="t-empty">No threads found.</div>
  </div>

  <!-- PROJECTS PAGE -->
  <div class="page" id="page-projects">
    <div class="hdr">
      <h2>Projects</h2>
      <p>Track colours used per embroidery work</p>
    </div>
    <div class="proj-toolbar">
      <span id="proj-count">0 projects</span>
      <button class="add-btn" onclick="openProjModal()">+ New project</button>
    </div>
    <div class="proj-list" id="proj-list"></div>
    <div class="empty hidden" id="p-empty">No projects yet. Add one above!</div>
  </div>
</div>

<div id="modal-area"></div>
<input type="file" id="img-picker" accept="image/*" style="display:none" onchange="handleImg(event)">

<script>
const PRESET_BRANDS=['DMC','Cosmo','Olympus','Anchor'];
const BRAND_C={DMC:'#C0392B',Cosmo:'#2980B9',Olympus:'#27AE60',Anchor:'#8E44AD',Other:'#888780'};
const COL_RANGES={
  red:(h,s,l)=>(h>=345||h<15)&&s>30&&l>15,
  orange:(h,s,l)=>h>=15&&h<45&&s>40,
  yellow:(h,s,l)=>h>=45&&h<75&&s>40,
  green:(h,s,l)=>h>=75&&h<165&&s>20,
  blue:(h,s,l)=>h>=165&&h<255&&s>20,
  purple:(h,s,l)=>h>=255&&h<300&&s>20,
  pink:(h,s,l)=>h>=300&&h<345&&s>25,
  white:(h,s,l)=>l>80,
  black:(h,s,l)=>l<15,
  gray:(h,s,l)=>s<18&&l>=15&&l<=80,
  brown:(h,s,l)=>h>=15&&h<45&&s>=20&&l>=15&&l<=52,
};
function hexToHsl(hex){
  let r=0,g=0,b=0;
  if(hex.length===4){r=parseInt(hex[1]+hex[1],16);g=parseInt(hex[2]+hex[2],16);b=parseInt(hex[3]+hex[3],16);}
  else if(hex.length===7){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);}
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=0,l=(mx+mn)/2;
  if(d){s=l>0.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;}
  return[h,s*100,l*100];
}
function matchesColour(hex,col){
  if(col==='all')return true; if(!hex)return false;
  const[h,s,l]=hexToHsl(hex);
  return COL_RANGES[col]?COL_RANGES[col](h,s,l):false;
}

  if(filterMode==='buy')list=list.filter(t=>t.buy);

async function chg(id,d){const t=threads.find(t=>t.id===id);if(!t)return;t.qty=Math.max(0,t.qty+d);await sbUpsert('threads',t);render();}
async function toggleBuy(id){const t=threads.find(t=>t.id===id);if(!t)return;t.buy=!t.buy;await sbUpsert('threads',t);render();}
async function delThread(id){if(!confirm('Remove this thread?'))return;threads=threads.filter(t=>t.id!==id);await sbDelete('threads',id);render();}

function threadStatus(no){
  const q=(no||'').toLowerCase().trim();
  const t=threads.find(t=>(t.brand+' '+t.no).toLowerCase()===q||t.no.toLowerCase()===q);
  if(!t)return'unknown';
  return t.qty>0&&!t.buy?'in':'out';
}

  empty.classList.add('hidden');
  list.innerHTML=projects.map(p=>{
    const inStock=p.threads.filter(t=>threadStatus(t.no)==='in').length;
    const missing=p.threads.filter(t=>threadStatus(t.no)==='out').length;
    const unknown=p.threads.filter(t=>threadStatus(t.no)==='unknown').length;
    const statsHtml=(inStock?`<span class="pstat ok">${inStock} in stock</span>`:'')+
      (missing?`<span class="pstat miss">${missing} missing</span>`:'')+
      (unknown?`<span class="pstat unk">${unknown} not in collection</span>`:'');
    const imgs=p.imgs||( p.img?[p.img]:[] );
    const photoSlots=[0,1,2].map(i=>{
      if(imgs[i]){

          <img src="${imgs[i]}" alt="photo ${i+1}">

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/></svg>
          <span class="slot-lbl">${i===0?'add photo':'+'}</span>
        </div>
      </div>`;
    }).join('');
    const imgHtml=`<div class="proj-photos">${photoSlots}</div>`;
    const descHtml=p.desc?`<div class="proj-desc">${p.desc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`:'';
    const threadRows=p.threads.map(t=>{

    }).join('');
    return`<div class="proj-card">
      <div class="proj-top">
        ${imgHtml}
        <div class="proj-info" style="padding:10px 13px;display:flex;flex-direction:column;gap:4px;min-width:0">
          <div class="proj-name">${p.name}</div>
          ${descHtml}
          <div class="proj-stats">${statsHtml||'<span class="pstat unk">No threads added</span>'}</div>
        </div>
      </div>
      ${p.threads.length?`<div class="thread-list">${threadRows}</div>`:''}
      <div class="proj-actions">
        <button class="proj-btn" onclick="openProjModal(${p.id})">Edit</button>
        <button class="proj-btn danger" onclick="delProj(${p.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function pickImg(id,slot){pendingImgProjId=id;pendingImgSlot=slot||0;document.getElementById('img-picker').click();}
function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const p=projects.find(p=>p.id===pendingImgProjId);
    if(p){
      if(!p.imgs)p.imgs=[];
      p.imgs[pendingImgSlot]=ev.target.result;
      sbUpsert('projects',{id:p.id,name:p.name,description:p.desc||'',imgs:p.imgs,threads:p.threads});
      renderProjects();
    }
  };
  r.readAsDataURL(file);e.target.value='';
}
function removePhoto(id,slot){
  const p=projects.find(p=>p.id===id);if(!p)return;
  if(!p.imgs)p.imgs=[];
  p.imgs.splice(slot,1);
  sbUpsert('projects',{id:p.id,name:p.name,description:p.desc||'',imgs:p.imgs,threads:p.threads});
  renderProjects();
}

async function saveThread(){
  const no=document.getElementById('f-no').value.trim();
  if(!no){alert('Please enter a thread number.');return;}
  const brandSel=document.getElementById('f-brand').value;
  const brand=brandSel==='custom'?(document.getElementById('f-custom-brand').value.trim()||'Other'):brandSel;
  const hex=document.getElementById('f-hex').value.trim()||document.getElementById('f-pick').value;
  const qty=Math.max(0,parseInt(document.getElementById('f-qty').value)||0);
  const name=document.getElementById('f-name').value.trim();
  if(editingThreadId){
    const t=threads.find(t=>t.id===editingThreadId);
    if(t){t.brand=brand;t.no=no;t.name=name;t.hex=hex;t.qty=qty;await sbUpsert('threads',t);}
  } else {
    const t={id:Date.now(),brand,no,name,hex,qty,buy:false};
    threads.push(t);
    await sbUpsert('threads',t);
  }
  closeModal();render();
}

  list.innerHTML=matches.slice(0,8).map(t=>`

async function saveProj(){
  const name=document.getElementById('p-name').value.trim();
  if(!name){alert('Please enter a project name.');return;}
  const desc=document.getElementById('p-desc').value.trim();
  const rows=[...document.querySelectorAll('#proj-thread-list .proj-thread-row')];
  const threadList=rows.map(r=>{
    const no=(r.querySelector('.ac-wrap input')||{value:''}).value.trim();
    const hex=r.querySelector('.t-hex-val').value.trim();
    const useInp=r.querySelectorAll('input[type=text]');
    const use=useInp.length?useInp[useInp.length-1].value.trim():'';
    return{no,hex,use};
  }).filter(t=>t.no);
  if(editingProjId){
    const p=projects.find(p=>p.id===editingProjId);
    if(p){p.name=name;p.desc=desc;p.threads=threadList;
      await sbUpsert('projects',{id:p.id,name:p.name,description:p.desc,imgs:p.imgs||[],threads:p.threads});}
  } else {
    const p={id:Date.now(),name,desc,imgs:[],threads:threadList};
    projects.push(p);
    await sbUpsert('projects',{id:p.id,name:p.name,description:p.desc,imgs:p.imgs,threads:p.threads});
  }
  closeModal();renderProjects();
}
